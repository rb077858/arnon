<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התראות כיתת ארנון</title>
  <style>
    body { margin: 0; background: black; color: #00ff00; font-family: monospace; overflow: hidden; }
    nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 1px solid #00ff00; z-index: 100; }
    button { background: none; border: 1px solid #0f0; color: #0f0; padding: 5px 15px; cursor: pointer; font-family: monospace; }
    button:hover { background: #0f0; color: #000; }
    canvas { position: fixed; top: 0; left: 0; z-index: -1; }
    .content { padding: 100px; text-align: center; }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <nav>
    <button id="btn-subscribe">🔔 הפעל התראות</button>
  </nav>

  <div class="content">
    <h1>מערכת התראות ארנון</h1>
    <p>לחץ על הכפתור למעלה כדי להירשם.</p>
  </div>

  <script type="module" src="./main.js"></script>
  <script>
    // Matrix Animation
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const letters = "01"; const fontSize = 14; const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 33);
  </script>
</body>
</html>
